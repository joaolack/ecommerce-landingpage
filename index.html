<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Catálogo</title>
</head>
<body>
    <header>
        <nav>
            <a href="#" class="logo">Logo</a>
            <ul>
                <li><a href="#">nav1</a></li>
                <li><a href="#">nav2</a></li>
                <li><a href="#">nav3</a></li>
                <li><a href="#">nav4</a></li>
            </ul>

            <div>
                <button class="register-btn">Criar Conta</button>
                <button class="login-btn">Acessar</button>
            </div>    
        </nav>    
    </header>

    <main class="main">
        <section class="gallery">
            <article class="game-card game-card--vertical">
                <img src="images/gta5-cover.jpg" alt="Gta 6 capa" class="game-card__image">
            </article>
            <article class="game-card game-card--vertical ">
                <img src="images/rdr2.jpg" alt="Red Dead Redemption 2 capa" class="game-card__image">
            </article>
            <article class="game-card game-card--vertical">
                <img src="images/skyrim.png" alt="Skyrim capa" class="game-card__image">
            </article>
            <article class="game-card game-card--vertical">
                <img src="images/yakuza-cover.png" alt="Yakuza: Like a Dragon capa" class="game-card__image">
            </article>
        </section>
        <section class="showcase">    
            <article class="game-card game-card--horizontal">
                <img src="images/project zomboid.jpg" alt="Gta 5 capa" class="game-card__image">
            </article>
            <article class="game-card game-card--horizontal">
                <img src="images/deadbydaylight.jpg"  alt="Gta 5 capa" class="game-card__image">
            </article>
            <article class="game-card game-card--horizontal">
                <img alt="Gta 5 capa" class="game-card__image">
            </article>
            <article class="game-card game-card--horizontal">
                <img  alt="Gta 5 capa" class="game-card__image">
            </article>
            <article class="game-card game-card--horizontal">
                <img  alt="Gta 5 capa" class="game-card__image">
            </article>
            <article class="game-card game-card--horizontal">
                <img alt="Gta 5 capa" class="game-card__image">
            </article>
        </section>
    </main>

    <footer class="footer">
        <p>Desenvolvido por @joaolack</p>
    </footer>
</body>
</html>
