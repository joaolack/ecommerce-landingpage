<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Pixel&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Catálogo</title>
</head>
<body>
    <header>
        <nav>
            <a href="#" class="logo">Logo</a>
            <ul>
                <li><a href="#">nav1</a></li>
                <li><a href="#">nav2</a></li>
                <li><a href="#">nav3</a></li>
                <li><a href="#">nav4</a></li>
            </ul>

            <div>
                <button class="register-btn">Criar Conta</button>
                <button class="login-btn">Acessar</button>
            </div>    
        </nav>    
    </header>

    <main class="main">
        <section class="gallery">
            <article class="game-card game-card--vertical">
                <img  alt="Gta 6 capa" class="game-card__image">
            </article>
            <article class="game-card game-card--vertical ">
                <img  alt="Red Dead Redemption 2 capa" class="game-card__image">
            </article>
            <article class="game-card game-card--vertical">
                <img  alt="Skyrim capa" class="game-card__image">
            </article>
            <article class="game-card game-card--vertical">
                <img  alt="Yakuza: Like a Dragon capa" class="game-card__image">
            </article>
        </section>
        <section class="showcase">    
            <article class="game-card game-card--horizontal">
                <img  alt="Gta 5 capa" class="game-card__image">
            </article>
            <article class="game-card game-card--horizontal">
                <img   alt="Gta 5 capa" class="game-card__image">
            </article>
            <article class="game-card game-card--horizontal">
                <img alt="Gta 5 capa" class="game-card__image">
            </article>
            <article class="game-card game-card--horizontal">
                <img  alt="Gta 5 capa" class="game-card__image">
            </article>
            <article class="game-card game-card--horizontal">
                <img  alt="Gta 5 capa" class="game-card__image">
            </article>
            <article class="game-card game-card--horizontal">
                <img alt="Gta 5 capa" class="game-card__image">
            </article>
        </section>
    </main>

    <footer class="footer">
        <section class="footer__main">

            <section class="footer__brand">
                <h3>Seguir a GameHub</h3>
                <div class="footer__social">
                    <a href="#" aria-label="Facebook"><i class="bi bi-facebook"></i></a>
                    <a href="#" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
                    <a href="#" aria-label="LinkedIn"><i class="bi bi-linkedin"></i></a>
                    <a href="#" aria-label="WhatsApp"><i class="bi bi-whatsapp"></i></a>
                </div>
            </section>

            <section class="footer__links">
                <section class="footer__column">
                    <h4>Institucional</h4>
                    <ul>
                        <li><a href="#">Sobre</a></li>
                        <li><a href="#">Carreiras</a></li>
                        <li><a href="#">Seu jogo no GameHub</a></li>
                        <li><a href="#">GameHub Co-op</a></li>
                    </ul>
                </section>

                <section class="footer__column">
                    <h4>Ajuda</h4>
                    <ul>
                        <li><a>Suporte</a></li>
                        <li><a>Central de Ajuda</a></li>
                        <li><a>Política de Reembolso</a></li>
                        <li><a>Segurança</a></li>
                    </ul>
                </section>
            </section>    

        </section>

        <section class="footer__selectors">
            <div class="selectors_modal">
                <i class="bi bi-globe"></i>
                <p>Português</p>
                <i class="bi bi-chevron-down"></i>
            </div>
        </section>

        <section class="footer__bottom">
            <div>
                <a href="#">GameHub</a>
                <span>&copy 2026</span>
            </div>    
            <p>Desenvolvido por <a href="#">@joaolack</a></p>
        </section>
    </footer>
</body>
</html>
